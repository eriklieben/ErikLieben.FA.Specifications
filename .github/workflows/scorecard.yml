name: OpenSSF Scorecard

on:
  # Run on pushes to main for tracking over time
  push:
    branches:
      - main
  # Run weekly to catch changes in dependencies/ecosystem
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6:00 UTC
  # Allow manual runs
  workflow_dispatch:

permissions: {}  # Minimal top-level permissions, defined per job

jobs:
  scorecard:
    name: Scorecard Analysis
    runs-on: ubuntu-latest

    permissions:
      # Required for uploading SARIF results
      security-events: write
      # Required for publishing results
      id-token: write
      # Required for reading repo contents
      contents: read
      # Required for DetectWorkflowPersistence check
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          # Publish results to OpenSSF REST API for badge
          publish_results: true

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: scorecard-results.sarif

      - name: Upload Scorecard results as artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: scorecard-results
          path: scorecard-results.sarif
          retention-days: 30
